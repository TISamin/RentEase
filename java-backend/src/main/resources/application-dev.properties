# ============================================
# RentEase DEV Profile — No Docker Required!
# ============================================
# Uses H2 embedded database instead of PostgreSQL.
# Data is stored in a local file so it persists across restarts.

server.port=8080
server.error.include-stacktrace=always

# H2 File-Based Database (persists data in ./data/renteasedb)
spring.datasource.url=jdbc:h2:file:./data/renteasedb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console — visit http://localhost:8080/h2-console to browse data
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Email / SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tahmidislamsamin@gmail.com
spring.mail.password=gtrlcvrafsquloju
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Allow large Base64 Image Uploads
server.tomcat.max-http-form-post-size=20MB
